<!-- Brutalist Toy Box. Artist: industrial toy designer building alien figures as
injection-molded playground equipment. Each creature from few large geometric primitives
at clear seams. Readability at 18 to 32 px via: (1) unique envelope per creature,
(2) distinct ground contact, (3) frame 2 motion displaces major masses.
Influences: Playmobil, Soviet toy design, Charley Harper. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320">
<defs>
	<g id="bonzoid-f1-shapes">
		<rect x="78" y="95" width="44" height="35"/>
		<rect x="88" y="130" width="24" height="28"/>
		<rect x="55" y="155" width="90" height="118"/>
		<polygon points="55,162 10,142 5,195 55,200"/>
		<polygon points="145,162 190,142 195,195 145,200"/>
		<rect x="30" y="270" width="140" height="30"/>
	</g>
	<g id="bonzoid-f1-face">
		<circle cx="90" cy="108" r="9" fill="#ffffff"/>
		<circle cx="112" cy="108" r="9" fill="#ffffff"/>
		<circle cx="92" cy="108" r="4" fill="#141422"/>
		<circle cx="114" cy="108" r="4" fill="#141422"/>
	</g>
	<g id="bonzoid-f1-draw">
		<use href="#bonzoid-f1-shapes" fill="#ffffff" stroke="#ffffff" stroke-width="28" stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#bonzoid-f1-shapes" fill="#141422" stroke="#141422" stroke-width="20" stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#bonzoid-f1-shapes" fill="currentColor"/>
		<use href="#bonzoid-f1-face"/>
	</g>
	<g id="bonzoid-f2-shapes">
		<rect x="68" y="88" width="44" height="35"/>
		<polygon points="68,123 112,123 98,158 78,158"/>
		<polygon points="48,155 138,150 142,272 45,275"/>
		<polygon points="48,160 20,95 8,125 48,190"/>
		<polygon points="138,158 195,155 190,200 138,200"/>
		<rect x="28" y="270" width="142" height="30"/>
	</g>
	<g id="bonzoid-f2-face">
		<circle cx="80" cy="102" r="9" fill="#ffffff"/>
		<circle cx="102" cy="102" r="9" fill="#ffffff"/>
		<circle cx="82" cy="102" r="4" fill="#141422"/>
		<circle cx="104" cy="102" r="4" fill="#141422"/>
	</g>
	<g id="bonzoid-f2-draw">
		<use href="#bonzoid-f2-shapes" fill="#ffffff" stroke="#ffffff" stroke-width="28" stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#bonzoid-f2-shapes" fill="#141422" stroke="#141422" stroke-width="20" stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#bonzoid-f2-shapes" fill="currentColor"/>
		<use href="#bonzoid-f2-face"/>
	</g>
	<symbol id="bonzoid-frame1" viewBox="0 0 200 320">
		<use href="#bonzoid-f1-draw"/>
	</symbol>
	<symbol id="bonzoid-frame2" viewBox="0 0 200 320">
		<use href="#bonzoid-f2-draw"/>
	</symbol>
	<symbol id="bonzoid-head" viewBox="0 0 120 120">
		<g transform="translate(-40,-48)">
			<use href="#bonzoid-f1-draw"/>
		</g>
	</symbol>
	<symbol id="bonzoid-silhouette1" viewBox="0 0 200 320">
		<use href="#bonzoid-f1-shapes" fill="#141422"/>
	</symbol>
	<symbol id="bonzoid-silhouette2" viewBox="0 0 200 320">
		<use href="#bonzoid-f2-shapes" fill="#141422"/>
	</symbol>
</defs>
<use href="#bonzoid-frame1" width="200" height="320"/>
</svg>
