<!-- Brutalist Toy Box. Artist: industrial toy designer building alien figures as
injection-molded playground equipment. Each creature from few large geometric primitives
at clear seams. Readability at 18 to 32 px via: (1) unique envelope per creature,
(2) distinct ground contact, (3) frame 2 motion displaces major masses.
Influences: Playmobil, Soviet toy design, Charley Harper. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
<defs>
	<g id="mule-f1-shapes">
		<polygon points="62,38 88,32 90,68 68,78 58,68"/>
		<rect x="42" y="52" width="22" height="22"/>
		<polygon points="55,32 60,8 68,30"/>
		<polygon points="72,28 80,5 86,26"/>
		<rect x="88" y="36" width="148" height="62"/>
		<polygon points="236,42 258,28 256,55"/>
		<rect x="98" y="98" width="14" height="68"/>
		<rect x="120" y="98" width="14" height="68"/>
		<rect x="198" y="98" width="14" height="68"/>
		<rect x="220" y="98" width="14" height="68"/>
		<rect x="94" y="162" width="22" height="12"/>
		<rect x="116" y="162" width="22" height="12"/>
		<rect x="194" y="162" width="22" height="12"/>
		<rect x="216" y="162" width="22" height="12"/>
	</g>
	<g id="mule-f1-draw">
		<use href="#mule-f1-shapes" fill="#ffffff" stroke="#ffffff" stroke-width="28" stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#mule-f1-shapes" fill="#141422" stroke="#141422" stroke-width="20" stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#mule-f1-shapes" fill="currentColor"/>
	</g>
	<g id="mule-f2-shapes">
		<polygon points="58,40 84,35 88,70 66,80 55,70"/>
		<rect x="38" y="55" width="22" height="22"/>
		<polygon points="52,34 57,10 65,32"/>
		<polygon points="69,30 77,7 83,28"/>
		<rect x="86" y="38" width="148" height="62"/>
		<polygon points="234,44 256,30 254,57"/>
		<rect x="85" y="100" width="14" height="66"/>
		<rect x="130" y="100" width="14" height="68"/>
		<rect x="208" y="100" width="14" height="68"/>
		<rect x="195" y="100" width="14" height="66"/>
		<rect x="81" y="162" width="22" height="12"/>
		<rect x="126" y="164" width="22" height="12"/>
		<rect x="204" y="164" width="22" height="12"/>
		<rect x="191" y="162" width="22" height="12"/>
	</g>
	<g id="mule-f2-draw">
		<use href="#mule-f2-shapes" fill="#ffffff" stroke="#ffffff" stroke-width="28" stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#mule-f2-shapes" fill="#141422" stroke="#141422" stroke-width="20" stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#mule-f2-shapes" fill="currentColor"/>
	</g>
	<symbol id="mule-frame1" viewBox="0 0 320 200">
		<use href="#mule-f1-draw"/>
	</symbol>
	<symbol id="mule-frame2" viewBox="0 0 320 200">
		<use href="#mule-f2-draw"/>
	</symbol>
	<symbol id="mule-silhouette1" viewBox="0 0 320 200">
		<use href="#mule-f1-shapes" fill="#141422"/>
	</symbol>
	<symbol id="mule-silhouette2" viewBox="0 0 320 200">
		<use href="#mule-f2-shapes" fill="#141422"/>
