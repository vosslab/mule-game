		<circle cx="74" cy="42" r="11"/>
		<circle cx="57" cy="46" r="11"/>
		<circle cx="44" cy="57" r="12"/>
		<ellipse cx="37" cy="80" rx="12" ry="16"/>
		<polygon points="85,95 83,106 56,88"/>
		<polygon points="72,126 70,137 44,150"/>
		<polygon points="75,151 73,162 46,142"/>
		<polygon points="85,177 83,188 55,199"/>
