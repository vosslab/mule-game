<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" width="200" height="320">
<defs>

<!-- ================================================================
ARTIST 6, THE HERALD. Design hypothesis: heraldic charges solved
sprite legibility six centuries ago; a beast on a banner must be
identified across a battlefield, which is the same problem as an
18 px sprite. Vocabulary: profile-first single-mass bodies;
exaggerated attitude poses borrowed from blazonry (statant at rest;
passant, volant, glissant, salient in motion); deep contour notches
instead of interior detail; tapered limbs that end in emphatic
points; one dominant diagonal axis in every frame 2. Faces are
light eye shapes with dark pupils under one heavy lid or brow line
that carries the personality word. Attitude, the tilt of the whole
mass, reads at 18 px when anatomy does not.
inkCoverage: TBD, filled after cast measurement.
================================================================ -->

	<!-- geometry frame 1: statant S-column of segment bulges, hooked head, fringe legs -->
	<g id="leggite-f1-shapes">
		<circle cx="95" cy="276" r="24"/>
		<circle cx="86" cy="251" r="23"/>
		<circle cx="83" cy="225" r="23"/>
		<circle cx="88" cy="199" r="23"/>
		<circle cx="98" cy="174" r="23"/>
		<circle cx="105" cy="148" r="23"/>
		<circle cx="102" cy="122" r="22"/>
		<circle cx="88" cy="98" r="21"/>
		<circle cx="92" cy="78" r="13"/>
		<circle cx="96" cy="60" r="12"/>
		<circle cx="106" cy="47" r="11"/>
		<circle cx="122" cy="40" r="11"/>
		<circle cx="139" cy="44" r="11"/>
		<circle cx="150" cy="55" r="12"/>
		<ellipse cx="154" cy="74" rx="13" ry="16"/>
		<polygon points="72,100 70,111 43,112"/>
		<polygon points="84,124 82,135 55,140"/>
		<polygon points="86,148 84,159 56,162"/>
		<polygon points="79,174 77,185 48,190"/>
		<polygon points="69,199 67,210 38,214"/>
		<polygon points="64,224 62,235 33,238"/>
		<polygon points="67,249 65,260 37,265"/>
		<polygon points="75,274 73,285 46,290"/>
		<polygon points="104,106 106,117 145,118"/>
		<polygon points="120,133 122,144 150,146"/>
		<polygon points="124,157 126,168 154,172"/>
		<polygon points="116,182 118,193 146,198"/>
		<polygon points="105,207 107,218 136,222"/>
		<polygon points="100,232 102,243 130,247"/>
		<polygon points="103,257 105,268 133,272"/>
		<polygon points="112,281 114,292 141,292"/>
		<polygon points="78,288 70,300 86,300"/>
		<polygon points="96,290 88,300 104,300"/>
		<polygon points="112,288 105,300 120,300"/>
	</g>

	<!-- face frame 1: narrow side-set eyes, pupils slid back, one flat sly lid -->
	<g id="leggite-f1-face">
		<ellipse cx="148.5" cy="71" rx="5.5" ry="5" fill="#ffffff"/>
		<ellipse cx="160" cy="71" rx="5.5" ry="5" fill="#ffffff"/>
		<circle cx="146.5" cy="72" r="2.8" fill="#141422"/>
		<circle cx="158" cy="72" r="2.8" fill="#141422"/>
		<rect x="142" y="63" width="24" height="5" fill="#141422"/>
	</g>

	<!-- draw frame 1: halo, ink, body, face -->
	<g id="leggite-f1-draw">
		<use href="#leggite-f1-shapes" fill="#ffffff" stroke="#ffffff" stroke-width="28"
			stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#leggite-f1-shapes" fill="#141422" stroke="#141422" stroke-width="20"
			stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#leggite-f1-shapes" fill="currentColor"/>
		<use href="#leggite-f1-face"/>
	</g>

