		<polygon points="92,290 84,300 100,300"/>
		<polygon points="108,290 101,300 116,300"/>
		<polygon points="124,289 117,300 132,300"/>
	</g>

	<!-- face frame 2: same sly eyes, pupils glancing back over the shoulder -->
	<g id="leggite-f2-face">
		<ellipse cx="31.5" cy="77" rx="5" ry="4.5" fill="#ffffff"/>
		<ellipse cx="42" cy="77" rx="5" ry="4.5" fill="#ffffff"/>
		<circle cx="33.5" cy="78" r="2.6" fill="#141422"/>
		<circle cx="44" cy="78" r="2.5" fill="#141422"/>
		<rect x="25.5" y="69.5" width="22" height="5" fill="#141422"/>
	</g>

	<!-- draw frame 2: halo, ink, body, face -->
	<g id="leggite-f2-draw">
		<use href="#leggite-f2-shapes" fill="#ffffff" stroke="#ffffff" stroke-width="28"
			stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#leggite-f2-shapes" fill="#141422" stroke="#141422" stroke-width="20"
			stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#leggite-f2-shapes" fill="currentColor"/>
		<use href="#leggite-f2-face"/>
	</g>

	<symbol id="leggite-frame1" viewBox="0 0 200 320">
		<use href="#leggite-f1-draw"/>
	</symbol>
	<symbol id="leggite-frame2" viewBox="0 0 200 320">
		<use href="#leggite-f2-draw"/>
	</symbol>
	<symbol id="leggite-head" viewBox="0 0 110 110">
		<g transform="translate(-65,-5)">
