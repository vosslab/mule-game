<rect x="0" y="210" width="200" height="110" fill="#22223a"/>

<use href="#bonzoid-frame1" width="20" height="32" x="14" y="30" style="color:#ff5a5f"/>
<use href="#bonzoid-frame2" width="20" height="32" x="44" y="30" style="color:#ff5a5f"/>
<use href="#bonzoid-head" width="18" height="18" x="76" y="44" style="color:#ff5a5f"/>
<use href="#bonzoid-frame1" width="11" height="18" x="104" y="44" style="color:#ff5a5f"/>
<use href="#bonzoid-frame2" width="11" height="18" x="122" y="44" style="color:#ff5a5f"/>

<use href="#bonzoid-frame1" width="20" height="32" x="14" y="130" style="color:#4fd8ff"/>
<use href="#bonzoid-frame2" width="20" height="32" x="44" y="130" style="color:#4fd8ff"/>
<use href="#bonzoid-head" width="18" height="18" x="76" y="144" style="color:#4fd8ff"/>
<use href="#bonzoid-frame1" width="11" height="18" x="104" y="144" style="color:#4fd8ff"/>
<use href="#bonzoid-frame2" width="11" height="18" x="122" y="144" style="color:#4fd8ff"/>

<use href="#bonzoid-frame1" width="20" height="32" x="14" y="230" style="color:#3aaa18"/>
<use href="#bonzoid-frame2" width="20" height="32" x="44" y="230" style="color:#3aaa18"/>
<use href="#bonzoid-head" width="18" height="18" x="76" y="244" style="color:#3aaa18"/>
<use href="#bonzoid-frame1" width="11" height="18" x="104" y="244" style="color:#f872e8"/>
<use href="#bonzoid-frame2" width="11" height="18" x="122" y="244" style="color:#f872e8"/>
</svg>
