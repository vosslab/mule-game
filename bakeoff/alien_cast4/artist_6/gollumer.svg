<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" width="200" height="320">
<defs>

	<!-- ================================================================
ARTIST 6, THE HERALD. Design hypothesis: heraldic charges solved
sprite legibility six centuries ago; a beast on a banner must be
identified across a battlefield, which is the same problem as an
18 px sprite. Vocabulary: profile-first single-mass bodies;
exaggerated attitude poses borrowed from blazonry (statant at rest;
passant, volant, glissant, salient in motion); deep contour notches
instead of interior detail; tapered limbs that end in emphatic
points; one dominant diagonal axis in every frame 2. Faces are
light eye shapes with dark pupils under one heavy lid or brow line
that carries the personality word. Attitude, the tilt of the whole
mass, reads at 18 px when anatomy does not.
inkCoverage: TBD, filled after cast measurement.
================================================================ -->

	<!-- geometry: one lopsided teardrop hill, crest folded forward, flat unbroken belly -->
	<g id="gollumer-f1-shapes">
		<path d="M 28,300
			C 27,270 32,226 50,186
			C 58,160 76,136 98,126
			C 120,118 142,122 152,140
			C 158,154 154,170 142,178
			C 134,182 126,180 122,172
			C 132,178 142,186 148,200
			C 160,222 166,246 166,272
			C 166,284 165,293 164,300
			Z"/>
	</g>

	<!-- face: heavy sad lids set low, pupils sunk beneath, small downturned mouth -->
	<g id="gollumer-f1-face">
		<circle cx="120" cy="214" r="12" fill="#ffffff"/>
		<circle cx="146" cy="222" r="10" fill="#ffffff"/>
		<circle cx="122" cy="220" r="5" fill="#141422"/>
		<circle cx="147" cy="228" r="4.5" fill="#141422"/>
		<ellipse cx="120" cy="205" rx="13" ry="10" fill="#141422"/>
		<ellipse cx="146" cy="214" rx="11" ry="8.5" fill="#141422"/>
		<path d="M 121,256 Q 133,246 145,257 Q 133,252 121,256 Z" fill="#141422"/>
	</g>

	<!-- draw stack: halo, ink, body color, face -->
	<g id="gollumer-f1-draw">
		<use href="#gollumer-f1-shapes" fill="#ffffff" stroke="#ffffff" stroke-width="28"
			stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#gollumer-f1-shapes" fill="#141422" stroke="#141422" stroke-width="20"
			stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#gollumer-f1-shapes" fill="currentColor"/>
		<use href="#gollumer-f1-face"/>
	</g>

	<!-- geometry frame 2: glissant ooze, mass stretched long and low, crest thrown back -->
	<g id="gollumer-f2-shapes">
		<path d="M 26,300
			C 26,276 32,248 46,226
			C 52,216 58,208 64,202
			C 56,200 48,196 42,186
			C 37,178 39,170 47,166
			C 60,162 74,168 84,180
			C 100,192 118,206 136,220
			C 152,232 164,246 170,262
			C 174,274 175,287 174,300
			Z"/>
	</g>

	<!-- face frame 2: same mournful lids, gaze dropped to the trail ahead -->
	<g id="gollumer-f2-face">
		<circle cx="124" cy="244" r="11" fill="#ffffff"/>
		<circle cx="148" cy="252" r="10" fill="#ffffff"/>
		<circle cx="126" cy="249" r="5" fill="#141422"/>
		<circle cx="150" cy="256" r="4.5" fill="#141422"/>
		<ellipse cx="124" cy="236" rx="12" ry="9" fill="#141422"/>
		<ellipse cx="148" cy="245" rx="11" ry="8" fill="#141422"/>
		<path d="M 125,276 Q 137,266 149,277 Q 137,272 125,276 Z" fill="#141422"/>
	</g>

	<!-- draw stack frame 2 -->
	<g id="gollumer-f2-draw">
		<use href="#gollumer-f2-shapes" fill="#ffffff" stroke="#ffffff" stroke-width="28"
			stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#gollumer-f2-shapes" fill="#141422" stroke="#141422" stroke-width="20"
			stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#gollumer-f2-shapes" fill="currentColor"/>
		<use href="#gollumer-f2-face"/>
	</g>

	<symbol id="gollumer-frame1" viewBox="0 0 200 320">
		<use href="#gollumer-f1-draw"/>
	</symbol>
	<symbol id="gollumer-frame2" viewBox="0 0 200 320">
		<use href="#gollumer-f2-draw"/>
	</symbol>
	<symbol id="gollumer-head" viewBox="0 0 110 110">
		<g transform="translate(-77,-170)">
			<use href="#gollumer-f1-draw"/>
		</g>
	</symbol>
	<symbol id="gollumer-silhouette1" viewBox="0 0 200 320">
		<use href="#gollumer-f1-shapes" fill="#141422"/>
	</symbol>
	<symbol id="gollumer-silhouette2" viewBox="0 0 200 320">
		<use href="#gollumer-f2-shapes" fill="#141422"/>
	</symbol>

</defs>

