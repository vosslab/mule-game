<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" width="200" height="320">
<defs>

	<!-- ================================================================
ARTIST 6, THE HERALD. Design hypothesis: heraldic charges solved
sprite legibility six centuries ago; a beast on a banner must be
identified across a battlefield, which is the same problem as an
18 px sprite. Vocabulary: profile-first single-mass bodies;
exaggerated attitude poses borrowed from blazonry (statant at rest;
passant, volant, glissant, salient in motion); deep contour notches
instead of interior detail; tapered limbs that end in emphatic
points; one dominant diagonal axis in every frame 2. Faces are
light eye shapes with dark pupils under one heavy lid or brow line
that carries the personality word. Attitude, the tilt of the whole
mass, reads at 18 px when anatomy does not.
inkCoverage: TBD, filled after cast measurement.
================================================================ -->

	<!-- MECHTRON: a shipping container that learned to walk and refuses
		to hurry. Statant: one slab torso with a sensor brow overhang and
		a vent notch bitten from the right edge, standing on two piston
		posts with wide flat foot plates, feet at y=300, a 50 unit
		daylight hole between the posts. Everything at 90 degrees.
		Frame 2, passant: the entire right post translated 30 units
		ahead and lifted 14, piston retracted 10; the slab tipped 5
		degrees toward the planted left side. The walk tilt is the only
		non-right angle in the file. Nothing undulates. -->

	<!-- geometry: silhouette primitives only, no fill and no stroke -->
	<g id="mechtron-f1-shapes">
		<rect x="28" y="54" width="122" height="22"/>
		<polygon points="34,74 144,74 144,146 118,146 118,178 144,178 144,200 34,200"/>
		<rect x="40" y="190" width="24" height="110"/>
		<rect x="114" y="190" width="24" height="110"/>
		<rect x="32" y="288" width="40" height="12"/>
		<rect x="106" y="288" width="40" height="12"/>
	</g>

	<!-- face: two square pale eyes under flat half-drawn lids, one
		straight mouth slit; stoic, deadpan, on schedule -->
	<g id="mechtron-f1-face">
		<rect x="47" y="88" width="32" height="30" fill="#ffffff"/>
		<rect x="99" y="88" width="32" height="30" fill="#ffffff"/>
		<rect x="44" y="84" width="38" height="17" fill="#141422"/>
		<rect x="96" y="84" width="38" height="17" fill="#141422"/>
		<rect x="57" y="101" width="12" height="9" fill="#141422"/>
		<rect x="109" y="101" width="12" height="9" fill="#141422"/>
		<rect x="73" y="138" width="32" height="7" fill="#141422"/>
	</g>

	<!-- draw stack: halo, ink, body, face -->
	<g id="mechtron-f1-draw">
		<use href="#mechtron-f1-shapes" fill="#ffffff" stroke="#ffffff" stroke-width="28"
			stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#mechtron-f1-shapes" fill="#141422" stroke="#141422" stroke-width="20"
			stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#mechtron-f1-shapes" fill="currentColor"/>
		<use href="#mechtron-f1-face"/>
	</g>

	<!-- frame 2 geometry: heavy walk. Slab and brow tip 5 degrees about
		the brow's top left corner toward the planted left post; the
		right post is the same piston translated 30 ahead, lifted 14,
		retracted 10. Posts stay perfectly vertical. -->
	<g id="mechtron-f2-shapes">
		<rect x="28" y="54" width="122" height="22" transform="rotate(-5,28,64)"/>
		<polygon points="34,74 144,74 144,146 118,146 118,178 144,178 144,200 34,200" transform="rotate(-5,28,64)"/>
		<rect x="40" y="190" width="24" height="110"/>
		<rect x="32" y="288" width="40" height="12"/>
		<rect x="144" y="186" width="24" height="100"/>
		<rect x="136" y="274" width="40" height="12"/>
	</g>

	<!-- frame 2 face: same deadpan panel, riding the tipped slab -->
	<g id="mechtron-f2-face" transform="rotate(-5,28,64)">
		<rect x="47" y="88" width="32" height="30" fill="#ffffff"/>
		<rect x="99" y="88" width="32" height="30" fill="#ffffff"/>
		<rect x="44" y="84" width="38" height="17" fill="#141422"/>
		<rect x="96" y="84" width="38" height="17" fill="#141422"/>
		<rect x="57" y="101" width="12" height="9" fill="#141422"/>
		<rect x="109" y="101" width="12" height="9" fill="#141422"/>
		<rect x="73" y="138" width="32" height="7" fill="#141422"/>
	</g>

	<!-- draw stack: halo, ink, body, face -->
	<g id="mechtron-f2-draw">
		<use href="#mechtron-f2-shapes" fill="#ffffff" stroke="#ffffff" stroke-width="28"
			stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#mechtron-f2-shapes" fill="#141422" stroke="#141422" stroke-width="20"
			stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#mechtron-f2-shapes" fill="currentColor"/>
		<use href="#mechtron-f2-face"/>
	</g>

	<symbol id="mechtron-frame1" viewBox="0 0 200 320">
		<use href="#mechtron-f1-draw"/>
	</symbol>
	<symbol id="mechtron-frame2" viewBox="0 0 200 320">
		<use href="#mechtron-f2-draw"/>
	</symbol>
	<symbol id="mechtron-head" viewBox="0 0 124 124">
		<g transform="translate(-26,-40)">
			<use href="#mechtron-f1-draw"/>
		</g>
	</symbol>
	<symbol id="mechtron-silhouette1" viewBox="0 0 200 320">
		<use href="#mechtron-f1-shapes" fill="#141422"/>
	</symbol>
	<symbol id="mechtron-silhouette2" viewBox="0 0 200 320">
		<use href="#mechtron-f2-shapes" fill="#141422"/>
	</symbol>

</defs>

<!-- PREVIEW: everything below this line is ignored by the generator -->
<rect x="0" y="0" width="200" height="320" fill="#1a1a2e"/>
<rect x="0" y="110" width="200" height="100" fill="#7c9a4e"/>
<rect x="0" y="210" width="200" height="110" fill="#22223a"/>

<use href="#mechtron-frame1" width="20" height="32" x="14" y="30" style="color:#ff5a5f"/>
<use href="#mechtron-frame2" width="20" height="32" x="44" y="30" style="color:#ff5a5f"/>
<use href="#mechtron-head" width="18" height="18" x="76" y="44" style="color:#ff5a5f"/>
<use href="#mechtron-frame1" width="11" height="18" x="104" y="44" style="color:#ff5a5f"/>
<use href="#mechtron-frame2" width="11" height="18" x="122" y="44" style="color:#ff5a5f"/>

<use href="#mechtron-frame1" width="20" height="32" x="14" y="130" style="color:#4fd8ff"/>
<use href="#mechtron-frame2" width="20" height="32" x="44" y="130" style="color:#4fd8ff"/>
<use href="#mechtron-head" width="18" height="18" x="76" y="144" style="color:#4fd8ff"/>
<use href="#mechtron-frame1" width="11" height="18" x="104" y="144" style="color:#4fd8ff"/>
<use href="#mechtron-frame2" width="11" height="18" x="122" y="144" style="color:#4fd8ff"/>

<use href="#mechtron-frame1" width="20" height="32" x="14" y="230" style="color:#3aaa18"/>
<use href="#mechtron-frame2" width="20" height="32" x="44" y="230" style="color:#3aaa18"/>
<use href="#mechtron-head" width="18" height="18" x="76" y="244" style="color:#3aaa18"/>
<use href="#mechtron-frame1" width="11" height="18" x="104" y="244" style="color:#f872e8"/>
<use href="#mechtron-frame2" width="11" height="18" x="122" y="244" style="color:#f872e8"/>
</svg>
