<use href="#packer-frame2" width="11" height="18" x="122" y="44" style="color:#ff5a5f"/>

<use href="#packer-frame1" width="20" height="32" x="14" y="130" style="color:#4fd8ff"/>
<use href="#packer-frame2" width="20" height="32" x="44" y="130" style="color:#4fd8ff"/>
<use href="#packer-head" width="18" height="18" x="76" y="144" style="color:#4fd8ff"/>
<use href="#packer-frame1" width="11" height="18" x="104" y="144" style="color:#4fd8ff"/>
<use href="#packer-frame2" width="11" height="18" x="122" y="144" style="color:#4fd8ff"/>

<use href="#packer-frame1" width="20" height="32" x="14" y="230" style="color:#3aaa18"/>
<use href="#packer-frame2" width="20" height="32" x="44" y="230" style="color:#3aaa18"/>
<use href="#packer-head" width="18" height="18" x="76" y="244" style="color:#3aaa18"/>
<use href="#packer-frame1" width="11" height="18" x="104" y="244" style="color:#f872e8"/>
<use href="#packer-frame2" width="11" height="18" x="122" y="244" style="color:#f872e8"/>
</svg>
