<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" width="200" height="320">
<defs>

	<!-- ================================================================
ARTIST 6, THE HERALD. Design hypothesis: heraldic charges solved
sprite legibility six centuries ago; a beast on a banner must be
identified across a battlefield, which is the same problem as an
18 px sprite. Vocabulary: profile-first single-mass bodies;
exaggerated attitude poses borrowed from blazonry (statant at rest;
passant, volant, glissant, salient in motion); deep contour notches
instead of interior detail; tapered limbs that end in emphatic
points; one dominant diagonal axis in every frame 2. Faces are
light eye shapes with dark pupils under one heavy lid or brow line
that carries the personality word. Attitude, the tilt of the whole
mass, reads at 18 px when anatomy does not.
inkCoverage: TBD, filled after cast measurement.
================================================================ -->

	<!-- frame 1 geometry: sejant squat, one huge lobed cargo blob on four tiny bent legs, belly daylight -->
	<g id="packer-f1-shapes">
		<ellipse cx="100" cy="190" rx="70" ry="88"/>
		<circle cx="70" cy="122" r="29"/>
		<circle cx="126" cy="108" r="33"/>
		<ellipse cx="100" cy="246" rx="64" ry="32"/>
		<polygon points="40,244 58,248 54,268 60,282 58,300 34,300 42,282 38,266"/>
		<polygon points="76,260 92,260 88,276 94,288 92,300 70,300 76,286 72,274"/>
		<polygon points="124,260 108,260 112,276 106,288 108,300 130,300 124,286 128,274"/>
		<polygon points="160,244 142,248 146,268 140,282 142,300 166,300 158,282 162,266"/>
	</g>

	<!-- frame 1 face: wide set round eyes, heavy dopey lids, big open ink grin -->
	<g id="packer-f1-face">
		<circle cx="64" cy="148" r="14" fill="#ffffff"/>
		<circle cx="136" cy="148" r="14" fill="#ffffff"/>
		<rect x="52" y="136" width="24" height="8" fill="#141422"/>
		<rect x="124" y="136" width="24" height="8" fill="#141422"/>
		<circle cx="66" cy="152" r="7.5" fill="#141422"/>
		<circle cx="134" cy="152" r="7.5" fill="#141422"/>
		<path d="M58,174 Q100,190 142,174 Q100,242 58,174 Z" fill="#141422"/>
	</g>

	<!-- frame 1 draw stack: halo, ink, body, face -->
	<g id="packer-f1-draw">
		<use href="#packer-f1-shapes" fill="#ffffff" stroke="#ffffff" stroke-width="28"
			stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#packer-f1-shapes" fill="#141422" stroke="#141422" stroke-width="20"
			stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#packer-f1-shapes" fill="currentColor"/>
		<use href="#packer-f1-face"/>
	</g>

	<!-- frame 2 geometry: salient launch, whole mass tilted back and lifted, rear legs extended driving, front legs tucked in the air -->
	<g id="packer-f2-shapes">
		<g transform="translate(0,-20) rotate(-12,100,190)">
			<ellipse cx="100" cy="190" rx="70" ry="88"/>
			<circle cx="70" cy="122" r="29"/>
			<circle cx="126" cy="108" r="33"/>
			<ellipse cx="100" cy="246" rx="64" ry="32"/>
		</g>
		<polygon points="54,226 70,234 54,286 62,300 34,300 42,282"/>
		<polygon points="84,240 100,244 90,290 98,300 70,300 78,284"/>
		<polygon points="116,232 130,238 138,252 132,268 120,264 126,250"/>
		<polygon points="142,222 156,226 164,240 160,256 148,252 152,238"/>
	</g>

	<!-- frame 2 face: same delighted face, tilted with the launch -->
	<g id="packer-f2-face">
		<g transform="translate(0,-20) rotate(-12,100,190)">
			<circle cx="64" cy="148" r="14" fill="#ffffff"/>
			<circle cx="136" cy="148" r="14" fill="#ffffff"/>
			<rect x="52" y="136" width="24" height="8" fill="#141422"/>
			<rect x="124" y="136" width="24" height="8" fill="#141422"/>
			<circle cx="66" cy="152" r="7.5" fill="#141422"/>
			<circle cx="134" cy="152" r="7.5" fill="#141422"/>
			<path d="M58,174 Q100,188 142,174 Q100,252 58,174 Z" fill="#141422"/>
		</g>
	</g>

	<!-- frame 2 draw stack: halo, ink, body, face -->
	<g id="packer-f2-draw">
		<use href="#packer-f2-shapes" fill="#ffffff" stroke="#ffffff" stroke-width="28"
			stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#packer-f2-shapes" fill="#141422" stroke="#141422" stroke-width="20"
			stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#packer-f2-shapes" fill="currentColor"/>
		<use href="#packer-f2-face"/>
	</g>

	<symbol id="packer-frame1" viewBox="0 0 200 320">
		<use href="#packer-f1-draw"/>
	</symbol>
	<symbol id="packer-frame2" viewBox="0 0 200 320">
		<use href="#packer-f2-draw"/>
	</symbol>
	<symbol id="packer-head" viewBox="0 0 120 120">
		<g transform="translate(-40,-108)">
			<use href="#packer-f1-draw"/>
		</g>
	</symbol>
	<symbol id="packer-silhouette1" viewBox="0 0 200 320">
		<use href="#packer-f1-shapes" fill="#141422"/>
	</symbol>
	<symbol id="packer-silhouette2" viewBox="0 0 200 320">
		<use href="#packer-f2-shapes" fill="#141422"/>
	</symbol>

</defs>

