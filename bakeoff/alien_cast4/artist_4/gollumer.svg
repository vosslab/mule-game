<!-- The Expressionist. Personality drives geometry: rounded masses carry gentle and
cheerful characters, hard angles carry sharp and stoic ones, and asymmetry carries sly or
mournful emotion. Distinct bottom edges and one large facial gesture make each being readable
at 18 to 32 px. Frame 2 displaces the feature most tied to each creature's temperament.
Measured frame 1/frame 2 ink coverage: humanoid 61.7/68.0%, flapper 35.6/35.1%, bonzoid
71.9/69.0%, gollumer 64.1/55.8%, spheroid 49.4/50.8%, leggite 59.0/58.8%, mechtron
65.7/63.9%, packer 63.1/51.6%, mule 59.9/60.9%. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320">
<defs>
	<g id="gollumer-f1-shapes">
		<path d="M37 276 L39 135 Q42 61 94 48 Q130 47 134 102 Q177 125 177 210 Q178 260 163 276 Z"/>
	</g>
	<g id="gollumer-f1-face">
		<ellipse cx="76" cy="112" rx="15" ry="13" fill="#ffffff"/>
		<ellipse cx="108" cy="119" rx="14" ry="12" fill="#ffffff"/>
		<circle cx="74" cy="117" r="6" fill="#141422"/>
		<circle cx="105" cy="124" r="6" fill="#141422"/>
		<ellipse cx="93" cy="150" rx="15" ry="5" fill="#141422"/>
	</g>
	<g id="gollumer-f1-draw">
		<use href="#gollumer-f1-shapes" fill="#ffffff" stroke="#ffffff" stroke-width="28" stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#gollumer-f1-shapes" fill="#141422" stroke="#141422" stroke-width="20" stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#gollumer-f1-shapes" fill="currentColor"/>
		<use href="#gollumer-f1-face"/>
	</g>
	<g id="gollumer-f2-shapes">
		<path d="M22 276 L27 174 Q32 112 75 102 Q112 93 130 147 Q174 159 186 219 L180 276 Z"/>
	</g>
	<g id="gollumer-f2-face">
		<ellipse cx="65" cy="155" rx="15" ry="12" fill="#ffffff"/>
		<ellipse cx="96" cy="158" rx="14" ry="11" fill="#ffffff"/>
		<circle cx="63" cy="160" r="6" fill="#141422"/>
		<circle cx="93" cy="163" r="6" fill="#141422"/>
		<ellipse cx="80" cy="186" rx="15" ry="5" fill="#141422"/>
	</g>
	<g id="gollumer-f2-draw">
		<use href="#gollumer-f2-shapes" fill="#ffffff" stroke="#ffffff" stroke-width="28" stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#gollumer-f2-shapes" fill="#141422" stroke="#141422" stroke-width="20" stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#gollumer-f2-shapes" fill="currentColor"/>
		<use href="#gollumer-f2-face"/>
	</g>
	<symbol id="gollumer-frame1" viewBox="0 0 200 320"><use href="#gollumer-f1-draw"/></symbol>
	<symbol id="gollumer-frame2" viewBox="0 0 200 320"><use href="#gollumer-f2-draw"/></symbol>
	<symbol id="gollumer-head" viewBox="0 0 140 140">
		<g transform="translate(-20,-45)"><use href="#gollumer-f1-draw"/></g>
	</symbol>
	<symbol id="gollumer-silhouette1" viewBox="0 0 200 320"><use href="#gollumer-f1-shapes" fill="#141422"/></symbol>
	<symbol id="gollumer-silhouette2" viewBox="0 0 200 320"><use href="#gollumer-f2-shapes" fill="#141422"/></symbol>
</defs>
<use href="#gollumer-frame1" width="200" height="320"/>
</svg>
