<!-- The Expressionist. Personality drives geometry: rounded masses carry gentle and
cheerful characters, hard angles carry sharp and stoic ones, and asymmetry carries sly or
mournful emotion. Distinct bottom edges and one large facial gesture make each being readable
at 18 to 32 px. Frame 2 displaces the feature most tied to each creature's temperament.
Measured frame 1/frame 2 ink coverage: humanoid 61.7/68.0%, flapper 35.6/35.1%, bonzoid
71.9/69.0%, gollumer 64.1/55.8%, spheroid 49.4/50.8%, leggite 59.0/58.8%, mechtron
65.7/63.9%, packer 63.1/51.6%, mule 59.9/60.9%. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320">
<defs>
	<g id="bonzoid-f1-shapes">
		<ellipse cx="100" cy="72" rx="31" ry="30"/>
		<path d="M61 101 Q100 78 139 101 L145 210 L55 210 Z"/>
		<path d="M63 113 L38 91 L26 48 L43 42 L66 93 Z"/>
		<circle cx="32" cy="38" r="19"/>
		<path d="M137 113 L162 91 L174 48 L157 42 L134 93 Z"/>
		<circle cx="168" cy="38" r="19"/>
		<rect x="32" y="218" width="136" height="54"/>
		<ellipse cx="100" cy="245" rx="48" ry="17"/>
	</g>
	<g id="bonzoid-f1-face">
		<ellipse cx="87" cy="67" rx="12" ry="13" fill="#ffffff"/>
		<ellipse cx="114" cy="67" rx="12" ry="13" fill="#ffffff"/>
		<circle cx="90" cy="68" r="6" fill="#141422"/>
		<circle cx="117" cy="68" r="6" fill="#141422"/>
		<ellipse cx="101" cy="91" rx="14" ry="10" fill="#141422"/>
	</g>
	<g id="bonzoid-f1-draw">
		<use href="#bonzoid-f1-shapes" fill="#ffffff" stroke="#ffffff" stroke-width="28" stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#bonzoid-f1-shapes" fill="#141422" stroke="#141422" stroke-width="20" stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#bonzoid-f1-shapes" fill="currentColor"/>
		<use href="#bonzoid-f1-face"/>
	</g>
	<g id="bonzoid-f2-shapes">
		<ellipse cx="101" cy="72" rx="31" ry="30"/>
		<path d="M62 101 Q101 78 140 101 L146 210 L56 210 Z"/>
		<path d="M65 114 L32 93 L20 126 L40 134 L76 125 Z"/>
		<circle cx="24" cy="130" r="19"/>
		<path d="M137 113 L160 76 L174 38 L156 31 L127 101 Z"/>
		<circle cx="168" cy="30" r="19"/>
		<rect x="33" y="218" width="136" height="54"/>
		<ellipse cx="110" cy="245" rx="48" ry="17"/>
	</g>
	<g id="bonzoid-f2-face">
		<ellipse cx="88" cy="67" rx="12" ry="13" fill="#ffffff"/>
		<ellipse cx="115" cy="67" rx="12" ry="13" fill="#ffffff"/>
		<circle cx="91" cy="68" r="6" fill="#141422"/>
		<circle cx="118" cy="68" r="6" fill="#141422"/>
		<ellipse cx="102" cy="91" rx="14" ry="10" fill="#141422"/>
	</g>
	<g id="bonzoid-f2-draw">
		<use href="#bonzoid-f2-shapes" fill="#ffffff" stroke="#ffffff" stroke-width="28" stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#bonzoid-f2-shapes" fill="#141422" stroke="#141422" stroke-width="20" stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#bonzoid-f2-shapes" fill="currentColor"/>
		<use href="#bonzoid-f2-face"/>
	</g>
	<symbol id="bonzoid-frame1" viewBox="0 0 200 320"><use href="#bonzoid-f1-draw"/></symbol>
	<symbol id="bonzoid-frame2" viewBox="0 0 200 320"><use href="#bonzoid-f2-draw"/></symbol>
	<symbol id="bonzoid-head" viewBox="0 0 130 130">
		<g transform="translate(-35,-0)"><use href="#bonzoid-f1-draw"/></g>
	</symbol>
	<symbol id="bonzoid-silhouette1" viewBox="0 0 200 320"><use href="#bonzoid-f1-shapes" fill="#141422"/></symbol>
	<symbol id="bonzoid-silhouette2" viewBox="0 0 200 320"><use href="#bonzoid-f2-shapes" fill="#141422"/></symbol>
</defs>
<use href="#bonzoid-frame1" width="200" height="320"/>
</svg>
