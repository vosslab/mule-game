	</symbol>
	<symbol id="leggite-silhouette1" viewBox="0 0 200 320"><use href="#leggite-f1-shapes" fill="#141422"/></symbol>
	<symbol id="leggite-silhouette2" viewBox="0 0 200 320"><use href="#leggite-f2-shapes" fill="#141422"/></symbol>
</defs>
<use href="#leggite-frame1" width="200" height="320"/>
