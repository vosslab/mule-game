<?xml version="1.0" encoding="UTF-8"?>
<!--
Cast 4, artist 2 hypothesis (opens every file):
Persona: bold picture-book toymaker. Fat rounded primitives, one dominant
focal feature per face, honest asymmetry, big Frame 2 pose beats that
redraw the outline. Bottom edge anchored first. Gold as a single warm
dot; player color body fills between the 40 halo and 20 ink.
Coverage aim 60 to 80 pct.

Spheroid: wide eyed floating tripod. War of the Worlds UFO. A huge orb
dominates the upper canvas; three narrow legs dangle and never reach the
ground. Frame 1 legs hang straight; frame 2 legs kick to different
angles and the orb tilts, selling float not walk. Two enormous surprised
eyes, tiny pupils, a small o mouth of shock. Gold: a small dome light
on the forehead. Ground contact: NONE, legs stop above y=250 so real
clear air remains below at every game size.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" width="200" height="320">
<defs>

	<g id="spheroid-f1-shapes">
		<circle cx="100" cy="124" r="64"/>
		<rect x="94" y="40" width="12" height="22" rx="6"/>
		<circle cx="100" cy="36" r="10"/>
		<rect x="48" y="186" width="16" height="64" rx="8"/>
		<rect x="92" y="186" width="14" height="56" rx="7"/>
		<rect x="136" y="186" width="16" height="64" rx="8"/>
	</g>
	<g id="spheroid-f1-face">
		<circle cx="76" cy="112" r="20" fill="#ffffff"/>
		<circle cx="124" cy="112" r="20" fill="#ffffff"/>
		<circle cx="76" cy="116" r="8" fill="#141422"/>
		<circle cx="124" cy="116" r="8" fill="#141422"/>
		<circle cx="100" cy="148" r="8" fill="#141422"/>
		<circle cx="100" cy="76" r="8" fill="#ffd23f"/>
	</g>
	<g id="spheroid-f1-draw">
		<use href="#spheroid-f1-shapes" fill="#ffffff" stroke="#ffffff" stroke-width="28"
			stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#spheroid-f1-shapes" fill="#141422" stroke="#141422" stroke-width="20"
			stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#spheroid-f1-shapes" fill="currentColor"/>
		<use href="#spheroid-f1-face"/>
	</g>

	<g id="spheroid-f2-shapes">
		<circle cx="104" cy="126" r="64"/>
		<rect x="96" y="40" width="12" height="22" rx="6" transform="rotate(12 102 51)"/>
		<circle cx="112" cy="36" r="10"/>
		<rect x="32" y="186" width="16" height="64" rx="8" transform="rotate(-24 40 218)"/>
		<rect x="88" y="186" width="14" height="60" rx="7" transform="rotate(-12 95 216)"/>
		<rect x="148" y="186" width="16" height="64" rx="8" transform="rotate(18 156 218)"/>
	</g>
	<g id="spheroid-f2-face">
		<circle cx="80" cy="114" r="20" fill="#ffffff"/>
		<circle cx="128" cy="114" r="20" fill="#ffffff"/>
		<circle cx="80" cy="118" r="8" fill="#141422"/>
		<circle cx="128" cy="118" r="8" fill="#141422"/>
		<circle cx="104" cy="150" r="8" fill="#141422"/>
		<circle cx="104" cy="78" r="8" fill="#ffd23f"/>
	</g>
	<g id="spheroid-f2-draw">
		<use href="#spheroid-f2-shapes" fill="#ffffff" stroke="#ffffff" stroke-width="28"
			stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#spheroid-f2-shapes" fill="#141422" stroke="#141422" stroke-width="20"
			stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#spheroid-f2-shapes" fill="currentColor"/>
		<use href="#spheroid-f2-face"/>
	</g>

	<symbol id="spheroid-frame1" viewBox="0 0 200 320"><use href="#spheroid-f1-draw"/></symbol>
	<symbol id="spheroid-frame2" viewBox="0 0 200 320"><use href="#spheroid-f2-draw"/></symbol>
	<symbol id="spheroid-head" viewBox="40 60 120 120"><use href="#spheroid-f1-draw"/></symbol>
	<symbol id="spheroid-silhouette1" viewBox="0 0 200 320">
		<use href="#spheroid-f1-shapes" fill="#141422"/>
	</symbol>
	<symbol id="spheroid-silhouette2" viewBox="0 0 200 320">
		<use href="#spheroid-f2-shapes" fill="#141422"/>
	</symbol>

</defs>
</svg>
