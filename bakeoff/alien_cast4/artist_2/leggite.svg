<?xml version="1.0" encoding="UTF-8"?>
<!--
Cast 4, artist 2 hypothesis (opens every file):
Persona: bold picture-book toymaker. Fat rounded primitives, one dominant
focal feature per face, honest asymmetry, big Frame 2 pose beats that
redraw the outline. Bottom edge anchored first. Gold as a single warm
dot; player color body fills between the 40 halo and 20 ink.
Coverage aim 60 to 80 pct.

Leggite: sly skittering column. A tall vertical stack of body lobes with
five legs fringing each side; small head with slit eyes on top. Frame 1
undulates one way (left lobes push out low, right lobes push out high);
frame 2 inverts the wave. Every leg on frame 2 tilts the opposite
direction of frame 1: the phase flip is the motion. Ground: the many
legged bottom fringe. Gold: a small jewel on the forehead.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" width="200" height="320">
<defs>

	<g id="leggite-f1-shapes">
