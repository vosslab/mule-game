<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" width="200" height="320">
<defs>

	<!-- ==========================================================
	WEDGE & HALO - industrial papercraft (cast-level design hypothesis)
	
	Every limb, wing, tread, and leg is drawn as a tapered trapezoid wedge
	rather than a plain rectangle, so the cast reads as cut-and-folded
	sheet metal rather than extruded blocks; masses that must read soft
	(gollumer's ooze, packer's cargo-hump, spheroid's saucer) fall back to
	circles and ellipses, giving a deliberate hard/soft split between the
	machine species and the creature species.
	
	Faces use the contract's proven construction - a white base shape
	with a dark strokeless pupil - sized and tilted per species to carry
	its personality word; two species (bonzoid, mechtron) trade the
	twin-eye convention for a single sensor lens or a flat visor slit,
	justified per-creature in the comment below.
	
	Every gap that carries a ground-contact identity (leg splits, the
	mechtron hole, the packer's belly daylight, the mule's under-slab
	daylight) is drawn at least 70 units wide at its narrowest, so the
	double-stroke halo (adding 20 units per edge) cannot pinch it shut.
	
	At most one gold accent per creature, used as a focal mark, not
	decoration. Coverage target: 25 to 75 percent per the contract's band;
	measured numbers for this cast are reported at verification time, not
	assumed in advance.
	========================================================== -->

	<!-- LEGGITE: the column's centerline zigzags left-right through seven
	segments for the undulating read; frame 2 is the exact horizontal
	mirror of frame 1 (every shape's x becomes 200-x), a clean, precise
	way to show the wave traveling the other direction without
	redesigning the body. -->

	<g id="leggite-f1-shapes">
		<ellipse cx="100" cy="40" rx="22" ry="24"/>
		<ellipse cx="92" cy="78" rx="26" ry="26"/>
		<ellipse cx="108" cy="118" rx="28" ry="28"/>
		<ellipse cx="88" cy="160" rx="28" ry="28"/>
		<ellipse cx="110" cy="202" rx="27" ry="27"/>
		<ellipse cx="90" cy="244" rx="26" ry="26"/>
		<ellipse cx="104" cy="284" rx="22" ry="22"/>
		<rect x="98" y="14" width="4" height="16"/>
		<polygon points="94,300 114,300 104,316"/>
		<polygon points="68,72 34,60 40,84 70,88"/>
		<polygon points="116,84 152,74 148,98 118,100"/>
		<polygon points="82,110 46,100 50,126 84,128"/>
		<polygon points="132,124 168,116 166,140 134,142"/>
		<polygon points="62,154 26,146 30,170 64,172"/>
		<polygon points="112,166 148,160 146,184 114,186"/>
		<polygon points="84,196 48,190 52,214 86,216"/>
		<polygon points="134,208 170,204 168,228 136,230"/>
		<polygon points="64,238 28,234 32,258 66,260"/>
		<polygon points="114,250 150,248 148,272 116,274"/>
	</g>

	<g id="leggite-f1-face">
		<ellipse cx="88" cy="36" rx="12" ry="7" fill="#ffffff"/>
		<ellipse cx="112" cy="42" rx="12" ry="7" fill="#ffffff"/>
		<circle cx="90" cy="36" r="4" fill="#141422"/>
		<circle cx="114" cy="42" r="4" fill="#141422"/>
		<polygon points="78,26 100,22 96,30" fill="#141422"/>
		<polygon points="104,32 128,30 122,38" fill="#141422"/>
		<circle cx="100" cy="16" r="5" fill="#ffd23f"/>
	</g>

	<g id="leggite-f1-draw">
		<use href="#leggite-f1-shapes" fill="#ffffff" stroke="#ffffff" stroke-width="28" stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#leggite-f1-shapes" fill="#141422" stroke="#141422" stroke-width="20" stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#leggite-f1-shapes" fill="currentColor"/>
		<use href="#leggite-f1-face"/>
	</g>

	<g id="leggite-f2-shapes">
		<ellipse cx="100" cy="40" rx="22" ry="24"/>
		<ellipse cx="108" cy="78" rx="26" ry="26"/>
		<ellipse cx="92" cy="118" rx="28" ry="28"/>
		<ellipse cx="112" cy="160" rx="28" ry="28"/>
		<ellipse cx="90" cy="202" rx="27" ry="27"/>
		<ellipse cx="110" cy="244" rx="26" ry="26"/>
		<ellipse cx="96" cy="284" rx="22" ry="22"/>
		<rect x="98" y="14" width="4" height="16"/>
		<polygon points="106,300 86,300 96,316"/>
		<polygon points="132,72 166,60 160,84 130,88"/>
		<polygon points="84,84 48,74 52,98 82,100"/>
		<polygon points="118,110 154,100 150,126 116,128"/>
		<polygon points="68,124 32,116 34,140 66,142"/>
		<polygon points="138,154 174,146 170,170 136,172"/>
		<polygon points="88,166 52,160 54,184 86,186"/>
		<polygon points="116,196 152,190 148,214 114,216"/>
		<polygon points="66,208 30,204 32,228 64,230"/>
		<polygon points="136,238 172,234 168,258 134,260"/>
		<polygon points="86,250 50,248 52,272 84,274"/>
	</g>

	<g id="leggite-f2-face">
		<ellipse cx="112" cy="36" rx="12" ry="7" fill="#ffffff"/>
		<ellipse cx="88" cy="42" rx="12" ry="7" fill="#ffffff"/>
		<circle cx="110" cy="36" r="4" fill="#141422"/>
		<circle cx="86" cy="42" r="4" fill="#141422"/>
		<polygon points="122,26 100,22 104,30" fill="#141422"/>
		<polygon points="96,32 72,30 78,38" fill="#141422"/>
		<circle cx="100" cy="16" r="5" fill="#ffd23f"/>
	</g>

	<g id="leggite-f2-draw">
		<use href="#leggite-f2-shapes" fill="#ffffff" stroke="#ffffff" stroke-width="28" stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#leggite-f2-shapes" fill="#141422" stroke="#141422" stroke-width="20" stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#leggite-f2-shapes" fill="currentColor"/>
		<use href="#leggite-f2-face"/>
	</g>

	<symbol id="leggite-frame1" viewBox="0 0 200 320">
		<use href="#leggite-f1-draw"/>
	</symbol>
	<symbol id="leggite-frame2" viewBox="0 0 200 320">
		<use href="#leggite-f2-draw"/>
	</symbol>
	<symbol id="leggite-head" viewBox="0 0 120 120">
		<g transform="translate(-40,0)"><use href="#leggite-f1-draw"/></g>
	</symbol>
	<symbol id="leggite-silhouette1" viewBox="0 0 200 320">
		<use href="#leggite-f1-shapes" fill="#141422"/>
	</symbol>
	<symbol id="leggite-silhouette2" viewBox="0 0 200 320">
		<use href="#leggite-f2-shapes" fill="#141422"/>
	</symbol>

</defs>
</svg>
