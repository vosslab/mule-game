Persona: Pell Karo, maker of hard-enamel lapel pins and die-cut vinyl stickers.
Influences: hard-enamel pins, cut-vinyl stickers, and mid-century transit and park
pictograms. Every creature is one bold, die-cut-clean pictogram silhouette. The
white halo and dark keyline become a polished metal rim around poured currentColor
enamel. At 18 to 32 px, the cast bets on whole-body gesture, a purpose-built bottom
edge, and one oversized enamel eye pair. Interiors stay nearly empty. Machine bodies
