<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" width="200" height="320">
<defs>

	<!-- ==========================================================
		DESIGN HYPOTHESIS (cast level, artist_3 / Pell Karo).
		Persona: Pell Karo, maker of hard-enamel lapel pins and
		die-cut vinyl stickers. Influences: hard-enamel pins,
		cut-vinyl stickers, and mid-century transit and park
		pictograms. Every creature is one bold, die-cut-clean
		pictogram silhouette. The white halo and dark keyline become
		a polished metal rim around poured currentColor enamel. At
		18 to 32 px, the cast bets on whole-body gesture, a
		purpose-built bottom edge, and one oversized enamel eye pair.
		Interiors stay nearly empty. Machine bodies use hard
		rectangles; organic bodies use curves. Frame 2 swings the
		whole pin so the silhouette communicates motion.
		==========================================================
		HUMANOID: the everyman, upright rounded biped. Frame 1 is a
		chest out, wide legged plucky stand with a gold chest badge.
		Frame 2 is an unmistakable march: left arm punches overhead,
		left leg lifts and swings forward, so one leg reaches the
		floor and one stops short. Rounded torso keeps it clear of
		the boxy mechtron; a real wedge of daylight between the feet
		keeps the two foot base legible.
		========================================================== -->

	<g id="humanoid-f1-shapes">
		<rect x="70" y="30" width="60" height="58" rx="24"/>
		<rect x="88" y="82" width="24" height="16"/>
		<rect x="60" y="94" width="80" height="86" rx="22"/>
		<rect x="66" y="172" width="68" height="28" rx="10"/>
