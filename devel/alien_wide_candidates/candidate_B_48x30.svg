<?xml version="1.0" encoding="UTF-8"?>
<!--
  Candidate B: wide, color-adaptable 48x30 alien study.

  Every species is an editable symbol with a 48x30 viewBox.  The closed outer
  silhouette uses currentColor, so the same art accepts every player tint.
  The board renders each frame at 5x for inspection and at native 1x in the
  player-color strip.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="840" viewBox="0 0 1280 840" role="img" aria-labelledby="title description">
  <title id="title">Candidate B wide 48 by 30 alien design study</title>
  <desc id="description">Two animation frames each for Mechtron, Bonzoid, and Flapper. Major body regions inherit player color through currentColor.</desc>

  <style>
    .board { fill: #171528; }
    .board-grid { fill: none; stroke: #292743; stroke-width: 1; }
    .card { fill: #22203a; stroke: #4a476d; stroke-width: 2; }
    .label { fill: #fff8e8; font-family: "Avenir Next Rounded", "Trebuchet MS", sans-serif; }
    .species-name { font-size: 30px; font-weight: 800; letter-spacing: 1.5px; }
    .species-note { fill: #c9c4df; font-family: "Avenir Next", "Trebuchet MS", sans-serif; font-size: 15px; }
    .frame-label { fill: #ffd23f; font-family: "Avenir Next Rounded", "Trebuchet MS", sans-serif; font-size: 14px; font-weight: 800; letter-spacing: 1.4px; }
    .preview-label { fill: #c9c4df; font-family: "Avenir Next", "Trebuchet MS", sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.7px; }
    .outer { fill: currentColor; stroke: #201b2c; stroke-width: 1.25; stroke-linejoin: round; stroke-linecap: round; }
    .panel { fill: #fff8e8; stroke: #201b2c; stroke-width: 1; stroke-linejoin: round; }
    .accent { fill: #ffd23f; stroke: #201b2c; stroke-width: 0.9; stroke-linejoin: round; }
    .ink { fill: #201b2c; }
    .detail { fill: none; stroke: #201b2c; stroke-width: 1; stroke-linecap: round; stroke-linejoin: round; }
    .preview-well { fill: #171528; stroke: #4a476d; stroke-width: 1; }
    .coral { color: #ff5a5f; }
    .cyan { color: #4fd8ff; }
    .green { color: #3aaa18; }
    .orchid { color: #f872e8; }
  </style>

  <defs>
    <!-- Mechtron: a centered panel robot. Antenna nubs, side pods, feet, and
         body share one closed, bilaterally symmetric outer silhouette. -->
    <symbol id="mechtron-frame-1" viewBox="0 0 48 30">
      <path class="outer" d="M10 5H16L18 2H21L23 5H25L27 2H30L32 5H38C42 5 45 8 45 12V15H46V22H42V25C42 27 40 28 38 28H34V29H29V26H19V29H14V28H10C8 28 6 27 6 25V22H2V15H3V12C3 8 6 5 10 5Z"/>
      <path class="panel" d="M12 11Q24 8.5 36 11V17Q24 20 12 17Z"/>
      <circle class="ink" cx="18.5" cy="14" r="1.8"/>
      <circle class="ink" cx="29.5" cy="14" r="1.8"/>
      <path class="detail" d="M20 16Q24 18 28 16"/>
      <path class="accent" d="M17 21H31V24H17Z"/>
      <path class="detail" d="M21 22.5H27"/>
    </symbol>
    <symbol id="mechtron-frame-2" viewBox="0 0 48 30">
      <path class="outer" d="M10 4H16L18 1H21L23 4H25L27 1H30L32 4H38C42 4 45 7 45 11V14H46V21H42V24C42 26 40 27 38 27H34V28H29V25H19V28H14V27H10C8 27 6 26 6 24V21H2V14H3V11C3 7 6 4 10 4Z"/>
      <path class="panel" d="M12 10Q24 7.5 36 10V16Q24 19 12 16Z"/>
      <circle class="ink" cx="18.5" cy="13" r="1.8"/>
      <circle class="ink" cx="29.5" cy="13" r="1.8"/>
      <path class="detail" d="M20 15Q24 13.5 28 15"/>
      <path class="accent" d="M17 20H31V23H17Z"/>
      <path class="detail" d="M21 21.5H27M18 24.5V26M30 24.5V26"/>
    </symbol>

    <!-- Bonzoid: a broad diamond-shield creature. Its raised fin frame uses
         the same centered core while clearly separating it from Mechtron. -->
    <symbol id="bonzoid-frame-1" viewBox="0 0 48 30">
      <path class="outer" d="M24 2L31 5L37 10L44 15L46 21L40 23L35 28H13L8 23L2 21L4 15L11 10L17 5Z"/>
      <path class="panel" d="M14 12Q24 8 34 12L32 19Q24 22 16 19Z"/>
      <circle class="ink" cx="19" cy="14.5" r="1.65"/>
      <circle class="ink" cx="29" cy="14.5" r="1.65"/>
      <path class="detail" d="M21 18Q24 19.8 27 18"/>
      <path class="accent" d="M17 22H31L29 26H19Z"/>
      <path class="detail" d="M21 24H27"/>
    </symbol>
    <symbol id="bonzoid-frame-2" viewBox="0 0 48 30">
      <path class="outer" d="M24 2L31 6L43 9L46 15L41 18H36L34 28H14L12 18H7L2 15L5 9L17 6Z"/>
      <path class="panel" d="M14 12Q24 8 34 12L32 19Q24 22 16 19Z"/>
      <circle class="ink" cx="19" cy="14.5" r="1.65"/>
      <circle class="ink" cx="29" cy="14.5" r="1.65"/>
      <path class="detail" d="M21 18Q24 16.4 27 18"/>
      <path class="accent" d="M17 22H31L29 26H19Z"/>
    </symbol>

    <!-- Flapper: a symmetric kite-moth. Frame one sweeps the wings down;
         frame two lifts both wings high in a deliberately legible wingbeat. -->
    <symbol id="flapper-frame-1" viewBox="0 0 48 30">
      <path class="outer" d="M24 3C28 3 31 6 32 10L45 20L42 27L31 20C30 25 28 28 24 28C20 28 18 25 17 20L6 27L3 20L16 10C17 6 20 3 24 3Z"/>
      <path class="panel" d="M17 12Q24 9 31 12V18Q24 22 17 18Z"/>
      <ellipse class="ink" cx="20.5" cy="15" rx="1.45" ry="1.75"/>
      <ellipse class="ink" cx="27.5" cy="15" rx="1.45" ry="1.75"/>
      <path class="detail" d="M21.5 18.5Q24 20 26.5 18.5"/>
      <path class="accent" d="M7 20L14 16L12 23Z"/>
      <path class="accent" d="M41 20L34 16L36 23Z"/>
      <circle class="accent" cx="24" cy="24" r="1.6"/>
    </symbol>
    <symbol id="flapper-frame-2" viewBox="0 0 48 30">
      <path class="outer" d="M24 4C28 4 31 7 32 11L44 2L46 9L33 18C31 24 28 28 24 28C20 28 17 24 15 18L2 9L4 2L16 11C17 7 20 4 24 4Z"/>
      <path class="panel" d="M17 12Q24 9 31 12V18Q24 22 17 18Z"/>
      <ellipse class="ink" cx="20.5" cy="15" rx="1.45" ry="1.75"/>
      <ellipse class="ink" cx="27.5" cy="15" rx="1.45" ry="1.75"/>
      <path class="detail" d="M21.5 18.5Q24 17 26.5 18.5"/>
      <path class="accent" d="M5 7L16 13L12 15Z"/>
      <path class="accent" d="M43 7L32 13L36 15Z"/>
      <circle class="accent" cx="24" cy="24" r="1.6"/>
    </symbol>
  </defs>

  <rect class="board" width="1280" height="840"/>
  <path class="board-grid" d="M0 76H1280M0 324H1280M0 572H1280M0 820H1280"/>
  <text class="label" x="40" y="42" font-family="Avenir Next Rounded, Trebuchet MS, sans-serif" font-size="34" font-weight="800" letter-spacing="1.4">CANDIDATE B · WIDE 48×30 ALIEN STUDY</text>
  <text class="species-note" x="42" y="65">Editable SVG symbols · currentColor bodies · bold dark outlines · 1× four-player preview at right</text>

  <!-- Mechtron card -->
  <rect class="card" x="24" y="94" width="1232" height="210" rx="18"/>
  <text class="label species-name" x="52" y="151">MECHTRON</text>
  <text class="species-note" x="52" y="177">wide panel bot</text>
  <text class="species-note" x="52" y="198">closed pod body</text>
  <text class="species-note" x="52" y="219">centered hop</text>
  <text class="frame-label" x="201" y="126">FRAME 1 · IDLE</text>
  <text class="frame-label" x="466" y="126">FRAME 2 · HOP</text>
  <rect class="preview-well" x="194" y="134" width="252" height="158" rx="12"/>
  <rect class="preview-well" x="459" y="134" width="252" height="158" rx="12"/>
  <use href="#mechtron-frame-1" class="coral" x="200" y="138" width="240" height="150"/>
  <use href="#mechtron-frame-2" class="coral" x="465" y="138" width="240" height="150"/>
  <text class="frame-label" x="760" y="126">NATIVE 1× · PLAYER COLORS</text>
  <rect class="preview-well" x="755" y="142" width="48" height="30" rx="5"/>
  <rect class="preview-well" x="823" y="142" width="48" height="30" rx="5"/>
  <rect class="preview-well" x="891" y="142" width="48" height="30" rx="5"/>
  <rect class="preview-well" x="959" y="142" width="48" height="30" rx="5"/>
  <use href="#mechtron-frame-1" class="coral" x="755" y="142" width="48" height="30"/>
  <use href="#mechtron-frame-1" class="cyan" x="823" y="142" width="48" height="30"/>
  <use href="#mechtron-frame-1" class="green" x="891" y="142" width="48" height="30"/>
  <use href="#mechtron-frame-1" class="orchid" x="959" y="142" width="48" height="30"/>
  <text class="preview-label" x="760" y="189">P0 CORAL</text>
  <text class="preview-label" x="829" y="189">P1 CYAN</text>
  <text class="preview-label" x="895" y="189">P2 GREEN</text>
  <text class="preview-label" x="962" y="189">P3 ORCHID</text>
  <text class="species-note" x="760" y="231">One closed silhouette: antenna nubs,</text>
  <text class="species-note" x="760" y="251">side pods, feet, and body stay joined.</text>

  <!-- Bonzoid card -->
  <rect class="card" x="24" y="342" width="1232" height="210" rx="18"/>
  <text class="label species-name" x="52" y="399">BONZOID</text>
  <text class="species-note" x="52" y="425">diamond shield</text>
  <text class="species-note" x="52" y="446">broad fin pulse</text>
  <text class="species-note" x="52" y="467">three-piece core</text>
  <text class="frame-label" x="201" y="374">FRAME 1 · REST</text>
  <text class="frame-label" x="466" y="374">FRAME 2 · FINS UP</text>
  <rect class="preview-well" x="194" y="382" width="252" height="158" rx="12"/>
  <rect class="preview-well" x="459" y="382" width="252" height="158" rx="12"/>
  <use href="#bonzoid-frame-1" class="cyan" x="200" y="386" width="240" height="150"/>
  <use href="#bonzoid-frame-2" class="cyan" x="465" y="386" width="240" height="150"/>
  <text class="frame-label" x="760" y="374">NATIVE 1× · PLAYER COLORS</text>
  <rect class="preview-well" x="755" y="390" width="48" height="30" rx="5"/>
  <rect class="preview-well" x="823" y="390" width="48" height="30" rx="5"/>
  <rect class="preview-well" x="891" y="390" width="48" height="30" rx="5"/>
  <rect class="preview-well" x="959" y="390" width="48" height="30" rx="5"/>
  <use href="#bonzoid-frame-1" class="coral" x="755" y="390" width="48" height="30"/>
  <use href="#bonzoid-frame-1" class="cyan" x="823" y="390" width="48" height="30"/>
  <use href="#bonzoid-frame-1" class="green" x="891" y="390" width="48" height="30"/>
  <use href="#bonzoid-frame-1" class="orchid" x="959" y="390" width="48" height="30"/>
  <text class="preview-label" x="760" y="437">P0 CORAL</text>
  <text class="preview-label" x="829" y="437">P1 CYAN</text>
  <text class="preview-label" x="895" y="437">P2 GREEN</text>
  <text class="preview-label" x="962" y="437">P3 ORCHID</text>
  <text class="species-note" x="760" y="479">The faceted diamond core gives Bonzoid</text>
  <text class="species-note" x="760" y="499">a strong, non-mechanical silhouette.</text>

  <!-- Flapper card -->
  <rect class="card" x="24" y="590" width="1232" height="210" rx="18"/>
  <text class="label species-name" x="52" y="647">FLAPPER</text>
  <text class="species-note" x="52" y="673">kite moth</text>
  <text class="species-note" x="52" y="694">clear wingbeat</text>
  <text class="species-note" x="52" y="715">wide flight read</text>
  <text class="frame-label" x="201" y="622">FRAME 1 · WINGS DOWN</text>
  <text class="frame-label" x="466" y="622">FRAME 2 · WINGS RAISED</text>
  <rect class="preview-well" x="194" y="630" width="252" height="158" rx="12"/>
  <rect class="preview-well" x="459" y="630" width="252" height="158" rx="12"/>
  <use href="#flapper-frame-1" class="green" x="200" y="634" width="240" height="150"/>
  <use href="#flapper-frame-2" class="green" x="465" y="634" width="240" height="150"/>
  <text class="frame-label" x="760" y="622">NATIVE 1× · PLAYER COLORS</text>
  <rect class="preview-well" x="755" y="638" width="48" height="30" rx="5"/>
  <rect class="preview-well" x="823" y="638" width="48" height="30" rx="5"/>
  <rect class="preview-well" x="891" y="638" width="48" height="30" rx="5"/>
  <rect class="preview-well" x="959" y="638" width="48" height="30" rx="5"/>
  <use href="#flapper-frame-1" class="coral" x="755" y="638" width="48" height="30"/>
  <use href="#flapper-frame-1" class="cyan" x="823" y="638" width="48" height="30"/>
  <use href="#flapper-frame-1" class="green" x="891" y="638" width="48" height="30"/>
  <use href="#flapper-frame-1" class="orchid" x="959" y="638" width="48" height="30"/>
  <text class="preview-label" x="760" y="685">P0 CORAL</text>
  <text class="preview-label" x="829" y="685">P1 CYAN</text>
  <text class="preview-label" x="895" y="685">P2 GREEN</text>
  <text class="preview-label" x="962" y="685">P3 ORCHID</text>
  <text class="species-note" x="760" y="727">The outer silhouette changes from a low</text>
  <text class="species-note" x="760" y="747">sweep to a high, unmistakable wingbeat.</text>
</svg>
