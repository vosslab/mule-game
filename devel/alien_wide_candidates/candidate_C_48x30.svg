  <rect class="header" x="0" y="858" width="1440" height="102"/>
  <text class="footer" x="52" y="895">CANDIDATE C PRINCIPLE: THE PLAYER TINT OWNS THE SILHOUETTE; THE FACE AND PANELS PROVIDE SPECIES IDENTITY.</text>
  <text class="footer" x="52" y="923">SYMBOL IDS: candidate-c-mechtron-frame1/2, candidate-c-bonzoid-frame1/2, candidate-c-flapper-frame1/2.</text>
