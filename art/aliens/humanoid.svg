<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" width="200" height="320">
<defs>

	<!-- ==========================================================
		HUMANOID: upright biped, narrow rounded column.
		Resting silhouette width 136 units (band 110 to 140), taken
		at the hands and at the feet. Torso is 84 wide, well under
		the mechtron's 96 minimum, and every form is rounded, so the
		block/box read belongs to the mechtron alone.
		Stance is a splayed A: the leg gap opens from the crotch to
		72 units at the feet, so a real background wedge survives the
		40 unit halo growth.
		Frame 2 is a march: left arm swings up past the head, left
		leg lifts. Both extremities move about 50 units.
		========================================================== -->

	<!-- geometry: silhouette primitives only, no fill and no stroke -->
	<g id="humanoid-f1-shapes">
		<rect x="68" y="24" width="64" height="64" rx="22"/>
		<rect x="86" y="80" width="28" height="18"/>
		<rect x="58" y="94" width="84" height="88" rx="20"/>
		<rect x="64" y="172" width="72" height="30" rx="10"/>
		<polygon points="66,100 38,104 32,168 60,164"/>
		<polygon points="134,100 162,104 168,168 140,164"/>
		<circle cx="47" cy="172" r="15"/>
		<circle cx="153" cy="172" r="15"/>
		<polygon points="88,190 58,190 32,266 64,266"/>
		<polygon points="112,190 142,190 168,266 136,266"/>
	</g>

	<!-- face: two eyes, one wide smile, one gold chest badge -->
	<g id="humanoid-f1-face">
		<circle cx="84" cy="54" r="14" fill="#ffffff"/>
		<circle cx="116" cy="54" r="14" fill="#ffffff"/>
		<circle cx="86" cy="56" r="7.5" fill="#141422"/>
		<circle cx="114" cy="56" r="7.5" fill="#141422"/>
		<path d="M78,68 Q100,96 122,68 Q100,82 78,68 Z" fill="#141422"/>
		<rect x="86" y="98" width="28" height="22" rx="5" fill="#ffd23f"/>
	</g>

	<g id="humanoid-f1-draw">
		<use href="#humanoid-f1-shapes" fill="#ffffff" stroke="#ffffff" stroke-width="40"
			stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#humanoid-f1-shapes" fill="#141422" stroke="#141422" stroke-width="20"
			stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#humanoid-f1-shapes" fill="currentColor"/>
		<use href="#humanoid-f1-face"/>
	</g>

	<!-- frame 2: mid march. Head and torso lean right, left arm is
		raised beside the head, left leg is lifted and swung inward,
		right leg is planted and extended. -->
	<g id="humanoid-f2-shapes">
		<rect x="72" y="22" width="64" height="64" rx="22"/>
		<rect x="90" y="78" width="28" height="18"/>
		<rect x="60" y="92" width="84" height="88" rx="20"/>
		<rect x="66" y="170" width="74" height="32" rx="10"/>
		<polygon points="80,100 52,56 28,72 56,116"/>
		<polygon points="126,111 154,105 174,195 146,189"/>
		<circle cx="42" cy="62" r="15"/>
		<circle cx="160" cy="196" r="15"/>
		<polygon points="84,186 56,190 60,226 88,230"/>
		<polygon points="116,188 146,186 172,264 142,266"/>
	</g>

	<g id="humanoid-f2-face">
		<circle cx="88" cy="52" r="14" fill="#ffffff"/>
		<circle cx="120" cy="52" r="14" fill="#ffffff"/>
		<circle cx="90" cy="54" r="7.5" fill="#141422"/>
		<circle cx="118" cy="54" r="7.5" fill="#141422"/>
		<path d="M82,66 Q104,94 126,66 Q104,80 82,66 Z" fill="#141422"/>
		<rect x="88" y="96" width="28" height="22" rx="5" fill="#ffd23f"/>
	</g>

	<g id="humanoid-f2-draw">
		<use href="#humanoid-f2-shapes" fill="#ffffff" stroke="#ffffff" stroke-width="40"
			stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#humanoid-f2-shapes" fill="#141422" stroke="#141422" stroke-width="20"
			stroke-linejoin="round" stroke-linecap="round"/>
		<use href="#humanoid-f2-shapes" fill="currentColor"/>
		<use href="#humanoid-f2-face"/>
	</g>

	<symbol id="humanoid-frame1" viewBox="0 0 200 320">
		<use href="#humanoid-f1-draw"/>
	</symbol>
	<symbol id="humanoid-frame2" viewBox="0 0 200 320">
		<use href="#humanoid-f2-draw"/>
	</symbol>
	<symbol id="humanoid-head" viewBox="46 14 108 108">
		<use href="#humanoid-f1-draw"/>
	</symbol>
	<symbol id="humanoid-silhouette1" viewBox="0 0 200 320">
		<use href="#humanoid-f1-shapes" fill="#141422"/>
	</symbol>
	<symbol id="humanoid-silhouette2" viewBox="0 0 200 320">
		<use href="#humanoid-f2-shapes" fill="#141422"/>
	</symbol>

</defs>

